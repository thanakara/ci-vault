name: CI-RetryLogic

on:
    push:
        branches:
            - main
            - feature/*
    workflow_dispatch:

jobs:
    ref-on-main:
        runs-on: ubuntu-latest
        timeout-minutes: 1
        permissions:
            contents: read
        # implicit: success() && github.ref == 'refs/heads/main'
        # if false → whole job is skipped, not failed
        if: github.ref == 'refs/heads/main'
        steps:
          - name: Dagger command
            id: dagger-cmd
            run: |
                echo "Ref is on ${{ github.ref_name }}."
                echo "dagger call my-func --user=${{ vars.USERNAME }} --pass=${{ secrets.PWD }}"


    ref-was-on-branch:
        runs-on: ubuntu-latest
        needs: ref-on-main
        permissions:
            contents: read
        # always() overrides implicit success() so GitHub evaluates the condition freely
        # without it, skipped needed-job → implicit success() false → this job auto-skipped
        if: always() && needs.ref-on-main.result == 'skipped'
        steps:
          - name: Retry dagger command
            run: |
                echo "Ref is on ${{ github.ref_name }}."
                echo "dagger call my-func --user=${{ vars.USERNAME }} --pass=${{ secrets.PWD }}"

          - name: Status
            # success() || failure() → skips if manually cancelled
            # always()              → runs even if manually cancelled
            if: success() || failure()
            run: |
                echo "REF_WAS_ON_BRANCH_JOB - Status: ${{ job.status }}"
                echo "REF_ON_MAIN_JOB       - Status: ${{ needs.ref-on-main.result }}"


    risky-job:
        runs-on: ubuntu-latest
        timeout-minutes: 1
        steps:
          - name: Risky command
            id: risky-cmd
            # continue-on-error: true  → conclusion: success, outcome: failure
            # continue-on-error: false → conclusion: failure, outcome: failure
            continue-on-error: true
            run: echo "Force failure" && exit 1

          - name: Handle it
            # always() needed because continue-on-error masks failure from if; failure()
            # outcome → raw result, conclusion → result after continue-on-error is applied
            if: always() && steps.risky-cmd.outcome == 'failure'
            run: |
                echo "Conclusion: ${{ steps.risky-cmd.conclusion }}"
                echo "Outcome:    ${{ steps.risky-cmd.outcome }}"
                echo "Outputs:    ${{ toJSON(steps.risky-cmd.outputs) }}"